<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sin conexión — UnderBro</title>
<meta name="theme-color" content="#0a0d18" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    display: grid; place-items: center; text-align: center; padding: 24px;
    font-family: 'Inter', system-ui, -apple-system, sans-serif; color: #eaf0fb;
    background: radial-gradient(70% 40% at 80% 0%, rgba(110,45,245,.35), transparent 60%),
                radial-gradient(60% 40% at 5% 20%, rgba(39,169,255,.22), transparent 60%),
                linear-gradient(180deg, #080a16, #04050b);
  }
  .box { max-width: 420px; }
  .ic { width: 84px; height: 84px; margin: 0 auto 22px; border-radius: 24px; display: grid; place-items: center;
        background: linear-gradient(135deg, #27a9ff, #6e2df5); box-shadow: 0 16px 40px rgba(62,87,252,.4); }
  .ic svg { width: 42px; height: 42px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  h1 { font-size: 26px; font-weight: 900; letter-spacing: -.02em; margin-bottom: 10px; }
  p { color: #93a0bd; font-size: 15px; line-height: 1.55; margin-bottom: 26px; }
  button {
    font: inherit; font-weight: 800; color: #fff; border: none; cursor: pointer;
    padding: 14px 30px; border-radius: 999px;
    background: linear-gradient(120deg, #27a9ff, #4060f5 52%, #6e2df5);
    box-shadow: 0 12px 30px rgba(62,87,252,.4);
  }
  button:active { transform: scale(.97); }
</style>
</head>
<body>
  <div class="box">
    <div class="ic"><svg viewBox="0 0 24 24"><path d="M1 1l22 22"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/><path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/><path d="M10.71 5.05A16 16 0 0 1 22.58 9"/><path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg></div>
    <h1>Sin conexión</h1>
    <p>Parece que no tienes internet ahora mismo. Tu música y tu gente te esperan — reintenta cuando vuelvas a estar en línea.</p>
    <button onclick="location.reload()">Reintentar</button>
  </div>
</body>
</html>
